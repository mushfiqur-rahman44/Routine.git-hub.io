<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routine Planner</title><style>body{
margin:0;
font-family:Arial;
background:#f2f5f9;
text-align:center;
}/* header */

header{
background:#4CAF50;
color:white;
padding:15px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

/* progress */

.progress-box{
width:90%;
max-width:600px;
margin:10px auto;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.progress-bar{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
background:#4CAF50;
width:0%;
}

/* calendar */

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:10px;
max-width:1000px;
margin:auto;
}

.weekday{
font-weight:bold;
background:#ddd;
padding:8px;
border-radius:5px;
}

.day{
background:white;
border-radius:8px;
padding:8px;
min-height:90px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.task{
margin-top:4px;
padding:3px;
border-radius:4px;
font-size:11px;
color:white;
display:flex;
align-items:center;
gap:3px;
}

/* colors */

.study{background:#4CAF50;}
.work{background:#FF9800;}
.health{background:#E91E63;}
.other{background:#2196F3;}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:280px;
}

input,select{
width:90%;
padding:8px;
margin:5px;
}

@media(max-width:600px){

.calendar{
grid-template-columns:repeat(2,1fr);
}

.weekday{
display:none;
}

}

</style></head><body>

<header>
<button onclick="prevMonth()">⬅</button><h2 id="monthTitle">Routine Planner - Created by MR (Mushfiqur Rahman)</h2><button onclick="nextMonth()">➡</button>

<button onclick="resetAllTasks()" style="background:red;color:white;border:none;padding:6px 10px;border-radius:5px;">Reset</button>

</header><div class="progress-box">
<h3>Today's Progress</h3>
<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>
<p id="progressText">0%</p>
</div><div class="progress-box">
<h3>Monthly Progress</h3>
<div class="progress-bar">
<div class="progress" id="monthProgress"></div>
</div>
<p id="monthProgressText">0%</p>
</div><div class="calendar" id="calendar"></div><div class="modal" id="modal">
<div class="modal-content">
<h3>Add Routine</h3>
<input id="taskText" placeholder="Task"><br>
<input type="time" id="taskTime"><br><select id="taskType">
<option value="study">Study</option>
<option value="work">Work</option>
<option value="health">Health</option>
<option value="other">Other</option>
</select><br><button onclick="saveTask()">Save</button>
<button onclick="closeModal()">Close</button>

</div>
</div><script>

let date=new Date()

let tasks=JSON.parse(localStorage.getItem("routineTasks"))||{}

let selectedKey=null

const weekdays=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
]

function renderCalendar(){

let year=date.getFullYear()
let month=date.getMonth()

document.getElementById("monthTitle").innerText=
months[month]+" "+year+" - Created by MR (Mushfiqur Rahman)"

let cal=document.getElementById("calendar")

cal.innerHTML=""

weekdays.forEach(d=>{

let w=document.createElement("div")
w.className="weekday"
w.innerText=d
cal.appendChild(w)

})

let firstDay=new Date(year,month,1).getDay()

let daysInMonth=new Date(year,month+1,0).getDate()

for(let i=0;i<firstDay;i++){

let blank=document.createElement("div")
cal.appendChild(blank)

}

for(let d=1;d<=daysInMonth;d++){

let key=year+"-"+month+"-"+d

let day=document.createElement("div")
day.className="day"
day.innerHTML="<b>"+d+"</b>"

if(tasks[key]){

tasks[key].forEach((t,index)=>{

let div=document.createElement("div")

div.className="task "+t.type

div.innerHTML=`
<input type="checkbox" onchange="toggleTask('${key}',${index})">
${t.time} ${t.text}
`

day.appendChild(div)

})

}

day.onclick=()=>openModal(key)

cal.appendChild(day)

}

updateProgress()
updateMonthlyProgress()

}

function prevMonth(){
date.setMonth(date.getMonth()-1)
renderCalendar()
}

function nextMonth(){
date.setMonth(date.getMonth()+1)
renderCalendar()
}

function openModal(key){
selectedKey=key
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function saveTask(){

let text=document.getElementById("taskText").value
let time=document.getElementById("taskTime").value
let type=document.getElementById("taskType").value

if(!tasks[selectedKey]){
tasks[selectedKey]=[]
}

tasks[selectedKey].push({text,time,type,done:false})

localStorage.setItem("routineTasks",JSON.stringify(tasks))

closeModal()
renderCalendar()

}

function toggleTask(key,index){

tasks[key][index].done=!tasks[key][index].done

localStorage.setItem("routineTasks",JSON.stringify(tasks))

updateProgress()
updateMonthlyProgress()

}

function updateProgress(){

let today=new Date()

let key=today.getFullYear()+"-"+today.getMonth()+"-"+today.getDate()

if(!tasks[key]) return

let total=tasks[key].length
let done=tasks[key].filter(t=>t.done).length

let percent=Math.round((done/total)*100)

document.getElementById("progress").style.width=percent+"%"
document.getElementById("progressText").innerText=percent+"%"

}

function updateMonthlyProgress(){

let year=date.getFullYear()
let month=date.getMonth()

let total=0
let done=0

for(let key in tasks){

let parts=key.split("-")

if(parts[0]==year && parts[1]==month){

tasks[key].forEach(t=>{
total++
if(t.done) done++
})

}

}

if(total==0) return

let percent=Math.round((done/total)*100)

document.getElementById("monthProgress").style.width=percent+"%"
document.getElementById("monthProgressText").innerText=percent+"%"

}

function resetAllTasks(){

let confirmReset=confirm("Delete all tasks?")

if(confirmReset){

localStorage.removeItem("routineTasks")

tasks={}

renderCalendar()

}

}

renderCalendar()

</script></body></html>
